<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Nexus Marketing Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0A2540 0%, #0F2B3D 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .login-container {
            max-width: 450px;
            width: 100%;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            background: white;
            border-radius: 30px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .logo i {
            color: #00D27F;
            font-size: 2rem;
        }

        .logo span {
            color: #0A2540;
        }

        .logo .highlight {
            color: #00D27F;
        }

        .login-header h2 {
            color: #0A2540;
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
        }

        .login-header p {
            color: #666;
            font-size: 0.9rem;
        }

        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .input-group i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #00D27F;
            font-size: 1.1rem;
        }

        .input-group input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #00D27F;
            box-shadow: 0 0 0 3px rgba(0,210,127,0.1);
        }

        .btn-login-submit {
            width: 100%;
            background: #00D27F;
            color: #0A2540;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-login-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,210,127,0.3);
            background: #00e088;
        }

        .error-msg {
            background: #f8d7da;
            color: #721c24;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            text-align: center;
            font-size: 0.9rem;
            display: none;
        }

        .demo-credentials {
            background: #f0f9ff;
            padding: 1rem;
            border-radius: 12px;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            text-align: center;
            border: 1px solid #d1ecf1;
        }

        .demo-credentials strong {
            color: #0A2540;
            display: block;
            margin-bottom: 0.5rem;
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-link a {
            color: #0A2540;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .back-link a:hover {
            color: #00D27F;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-chart-line"></i>
                    <span>Nexus<span class="highlight">Marketing</span></span>
                </div>
                <h2>Panel de Administración</h2>
                <p>Accede para gestionar tu contenido</p>
            </div>
            
            <div id="errorMessage" class="error-msg"></div>
            
            <form id="loginForm">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="correo@nexusmarketing.com" required autocomplete="off">
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Contraseña" required>
                </div>
                <button type="submit" class="btn-login-submit">
                    <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
                </button>
            </form>
            
            <div class="demo-credentials">
                <strong>🔐 Credenciales de demostración:</strong>
                📧 Email: admin@nexus.com<br>
                🔑 Contraseña: admin123
            </div>
            
            <div class="back-link">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Volver al sitio</a>
            </div>
        </div>
    </div>
    
    <script>
        // Sistema de autenticación
        const VALID_CREDENTIALS = {
            email: 'admin@nexus.com',
            password: 'admin123'
        };

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            
            if (email === VALID_CREDENTIALS.email && password === VALID_CREDENTIALS.password) {
                // Guardar sesión
                localStorage.setItem('nexus_admin_logged', 'true');
                localStorage.setItem('nexus_admin_email', email);
                // Redirigir al dashboard
                window.location.href = 'dashboard.html';
            } else {
                errorDiv.style.display = 'block';
                errorDiv.textContent = '❌ Credenciales incorrectas. Usa admin@nexus.com / admin123';
                setTimeout(() => {
                    errorDiv.style.display = 'none';
                }, 3000);
            }
        });

        // Verificar si ya está logueado
        if (localStorage.getItem('nexus_admin_logged') === 'true') {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
